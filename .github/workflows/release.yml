name: Build and Release KeePass AutoReload

on:
  push:
    branches: ["*"]
    tags:
      - "v*"
  pull_request:
    branches: ["*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Download KeePass
        shell: powershell
        run: |
          $keepassDir = Join-Path $env:RUNNER_TEMP "KeePass"
          New-Item -ItemType Directory -Path $keepassDir -Force | Out-Null
          $zipPath = Join-Path $env:RUNNER_TEMP "KeePass.zip"

          curl.exe -L -o $zipPath "https://sourceforge.net/projects/keepass/files/KeePass%202.x/2.61.1/KeePass-2.61.1.zip/download"
          $header = [System.IO.File]::ReadAllBytes($zipPath)[0..1]
          if (($header[0] -ne 0x50) -or ($header[1] -ne 0x4B)) {
            throw "KeePass download did not return a zip file."
          }

          Expand-Archive -Path $zipPath -DestinationPath $keepassDir -Force

          if (!(Test-Path (Join-Path $keepassDir "KeePass.exe"))) {
            throw "KeePass.exe was not extracted."
          }

          "KEEPASS_DIR=$keepassDir" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Run tests
        shell: powershell
        run: dotnet test tests/KeePassAutoReload.Tests.csproj

      - name: Build plugin and updater
        shell: powershell
        run: |
          msbuild src/KeePassAutoReload.csproj `
            /p:Configuration=Release `
            /p:Platform="AnyCPU" `
            /p:KeePassReferencePath="$env:KEEPASS_DIR"

          msbuild src/KeePassAutoReload.Updater/KeePassAutoReload.Updater.csproj `
            /p:Configuration=Release `
            /p:Platform="AnyCPU"

      - name: Create PLGX package
        shell: powershell
        run: |
          $keepassDir = $env:KEEPASS_DIR
          $keepassExe = Join-Path $keepassDir "KeePass.exe"
          $plgxSrc = Join-Path $env:GITHUB_WORKSPACE "plgx-src"

          New-Item -ItemType Directory -Path $plgxSrc -Force | Out-Null

          # Copy plugin source files only (exclude the updater project)
          Copy-Item "$env:GITHUB_WORKSPACE\src\*.cs" $plgxSrc\ -Force
          Copy-Item "$env:GITHUB_WORKSPACE\src\Properties" $plgxSrc\ -Recurse -Force

          Write-Host "Creating PLGX package with KeePass (with 60s timeout)..."
          $job = Start-Job {
            param($exe, $src)
            & $exe --plgx-create $src
          } -ArgumentList $keepassExe, $plgxSrc

          $completed = $job | Wait-Job -Timeout 60
          if ($completed) {
            Receive-Job $job | ForEach-Object { Write-Host $_ }
            Remove-Job $job
          } else {
            Write-Warning "KeePass.exe --plgx-create did not complete within 60 seconds; falling back to manual PLGX creation."
            Stop-Job $job
            Remove-Job $job -Force
          }

          Start-Sleep -Seconds 2

          Write-Host "Files in workspace root:"
          Get-ChildItem $env:GITHUB_WORKSPACE -Filter "*.plgx" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }

          Write-Host "Files in plgx-src:"
          Get-ChildItem $plgxSrc -Filter "*.plgx" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }

          $srcPlgx = Join-Path $env:GITHUB_WORKSPACE "plgx-src.plgx"
          $plgxPath = "$env:GITHUB_WORKSPACE\KeePassAutoReload.plgx"
          if (Test-Path $srcPlgx) {
            Move-Item $srcPlgx $plgxPath -Force
            Write-Host "PLGX package created: KeePassAutoReload.plgx"
          } else {
            Write-Warning "KeePass PLGX creation failed; skipping PLGX asset for this build."
          }

      - name: Prepare release assets
        shell: powershell
        run: |
          $dist = Join-Path $env:GITHUB_WORKSPACE "dist"
          New-Item -ItemType Directory -Path $dist -Force | Out-Null

          Copy-Item "bin/Release/KeePassAutoReload.dll" "$dist/KeePassAutoReload.dll" -Force
          Copy-Item "src/KeePassAutoReload.Updater/bin/Release/KeePassAutoReload.Updater.exe" `
            "$dist/KeePassAutoReload.Updater.exe" -Force
          Copy-Item "README.md" "$dist/README.md" -Force

          $zipPaths = @("$dist/KeePassAutoReload.dll", "$dist/KeePassAutoReload.Updater.exe", "$dist/README.md")
          $plgxPath = "$env:GITHUB_WORKSPACE\KeePassAutoReload.plgx"
          if (Test-Path $plgxPath) {
            $plgxSize = (Get-Item $plgxPath).Length
            if ($plgxSize -gt 0) {
              Copy-Item $plgxPath "$dist/KeePassAutoReload.plgx" -Force
              $zipPaths += "$dist/KeePassAutoReload.plgx"
              Write-Host "Including PLGX in release assets ($plgxSize bytes)."
            } else {
              Write-Warning "PLGX file is empty; excluding from release assets."
            }
          } else {
            Write-Warning "PLGX file not found; excluding from release assets."
          }

          Compress-Archive -Path $zipPaths -DestinationPath "$dist/KeePassAutoReload.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: KeePassAutoReload
          path: |
            dist/KeePassAutoReload.dll
            dist/KeePassAutoReload.zip

      - name: Publish GitHub release
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'Latest Build' }}
          draft: false
          prerelease: false
          make_latest: true
          files: |
            dist/KeePassAutoReload.dll
            dist/KeePassAutoReload.Updater.exe
            dist/KeePassAutoReload.zip

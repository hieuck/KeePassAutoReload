name: Build and Release KeePass AutoReload

on:
  push:
    branches: ["*"]
    tags:
      - "v*"
  pull_request:
    branches: ["*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Cache KeePass
        id: cache-keepass
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\KeePass
          key: keepass-2.61.1-${{ runner.os }}

      - name: Download KeePass
        if: steps.cache-keepass.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $keepassDir = Join-Path $env:RUNNER_TEMP "KeePass"
          New-Item -ItemType Directory -Path $keepassDir -Force | Out-Null
          $zipPath = Join-Path $env:RUNNER_TEMP "KeePass.zip"

          curl.exe -L -o $zipPath "https://sourceforge.net/projects/keepass/files/KeePass%202.x/2.61.1/KeePass-2.61.1.zip/download"
          $header = [System.IO.File]::ReadAllBytes($zipPath)[0..1]
          if (($header[0] -ne 0x50) -or ($header[1] -ne 0x4B)) {
            throw "KeePass download did not return a zip file."
          }

          Expand-Archive -Path $zipPath -DestinationPath $keepassDir -Force

          if (!(Test-Path (Join-Path $keepassDir "KeePass.exe"))) {
            throw "KeePass.exe was not extracted."
          }

      - name: Export KeePass directory
        shell: powershell
        run: |
          $keepassDir = Join-Path $env:RUNNER_TEMP "KeePass"
          if (!(Test-Path (Join-Path $keepassDir "KeePass.exe"))) {
            throw "KeePass.exe is not available."
          }
          "KEEPASS_DIR=$keepassDir" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Run tests
        shell: powershell
        run: dotnet test tests/KeePassAutoReload.Tests.csproj

      - name: Build plugin and updater
        shell: powershell
        run: |
          msbuild src/KeePassAutoReload.csproj `
            /p:Configuration=Release `
            /p:Platform="AnyCPU" `
            /p:KeePassReferencePath="$env:KEEPASS_DIR"

          msbuild src/KeePassAutoReload.Updater/KeePassAutoReload.Updater.csproj `
            /p:Configuration=Release `
            /p:Platform="AnyCPU"

      - name: Prepare release assets
        shell: powershell
        run: |
          $dist = Join-Path $env:GITHUB_WORKSPACE "dist"
          New-Item -ItemType Directory -Path $dist -Force | Out-Null

          Copy-Item "bin/Release/KeePassAutoReload.dll" "$dist/KeePassAutoReload.dll" -Force
          Copy-Item "src/KeePassAutoReload.Updater/bin/Release/KeePassAutoReload.Updater.exe" `
            "$dist/KeePassAutoReload.Updater.exe" -Force
          Copy-Item "README.md" "$dist/README.md" -Force

          $dllHash = (Get-FileHash "$dist/KeePassAutoReload.dll" -Algorithm SHA256).Hash.ToLower()
          $updaterHash = (Get-FileHash "$dist/KeePassAutoReload.Updater.exe" -Algorithm SHA256).Hash.ToLower()
          $zipHash = $null

          Compress-Archive -Path "$dist/KeePassAutoReload.dll", "$dist/KeePassAutoReload.Updater.exe", "$dist/README.md" `
            -DestinationPath "$dist/KeePassAutoReload.zip" -Force
          $zipHash = (Get-FileHash "$dist/KeePassAutoReload.zip" -Algorithm SHA256).Hash.ToLower()

          $checksums = @(
            "$dllHash  KeePassAutoReload.dll",
            "$updaterHash  KeePassAutoReload.Updater.exe",
            "$zipHash  KeePassAutoReload.zip"
          )
          $checksums | Out-File "$dist/SHA256SUMS.txt" -Encoding utf8

          Write-Host "SHA256SUMS.txt contents:"
          Get-Content "$dist/SHA256SUMS.txt"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: KeePassAutoReload
          path: |
            dist/KeePassAutoReload.dll
            dist/KeePassAutoReload.zip

      - name: Publish GitHub release
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'Latest Build' }}
          draft: false
          prerelease: false
          make_latest: true
          files: |
            dist/KeePassAutoReload.dll
            dist/KeePassAutoReload.Updater.exe
            dist/KeePassAutoReload.zip
            dist/SHA256SUMS.txt
